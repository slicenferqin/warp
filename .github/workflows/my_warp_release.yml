name: My Warp OSS Release
run-name: My Warp OSS ${{ inputs.tag_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, e.g. my-warp-oss-v0.1.0'
        required: true
        type: string
      runner_label:
        description: 'macOS runner label. Use macos-26 by default; macos-26-xlarge if enabled for faster builds.'
        required: true
        type: choice
        default: macos-26
        options:
          - macos-26
          - macos-26-xlarge
      release_name:
        description: 'GitHub release title. If empty, the tag is used.'
        required: false
        type: string
        default: ''
      draft:
        description: 'Create the GitHub release as a draft.'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Mark the GitHub release as a prerelease.'
        required: true
        type: boolean
        default: true
      publish_release:
        description: 'Create or update a GitHub Release. If false, only workflow artifacts are uploaded.'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: my-warp-oss-release-${{ github.ref }}-${{ inputs.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_CHANNEL: oss

defaults:
  run:
    shell: bash

jobs:
  build_macos:
    name: Build macOS OSS DMG
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 150

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate release inputs
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          TAG="$TAG_NAME"
          if [[ ! "$TAG" =~ ^my-warp-oss-v[0-9]+(\.[0-9]+){2}(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::tag_name must look like my-warp-oss-v0.1.0 or my-warp-oss-v0.1.0-rc1"
            exit 1
          fi

          if [[ "$RELEASE_NAME_INPUT" == *$'\n'* ]]; then
            echo "::error::release_name must be a single line"
            exit 1
          fi

      - name: Prepare macOS environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install macOS release tools
        run: |
          set -euo pipefail

          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          ./script/install_cargo_bundle
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Print build environment
        run: |
          set -euo pipefail

          sw_vers
          xcodebuild -version
          rustc --version
          cargo --version

      - name: Validate i18n resources
        run: |
          set -euo pipefail

          cargo xtask check-i18n --check-parity
          cargo xtask check-i18n --mode hard

      - name: Verify release compilation flags
        run: |
          set -euo pipefail

          ./script/bundle --channel "$RELEASE_CHANNEL" --check-only --nosign

      - name: Build self-signed OSS DMG
        id: bundle_app
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail

          ./script/bundle \
            --channel "$RELEASE_CHANNEL" \
            --release-tag "$TAG_NAME" \
            --selfsign

      - name: Stage release artifacts
        id: stage_artifacts
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
          DMG_SOURCE: ${{ steps.bundle_app.outputs.dmg_path }}
        run: |
          set -euo pipefail

          mkdir -p dist

          TAG="$TAG_NAME"
          DMG_NAME="My-Warp-${TAG}-macos-universal-unnotarized.dmg"

          if [[ ! -f "$DMG_SOURCE" ]]; then
            echo "::error::Expected DMG was not produced: $DMG_SOURCE"
            exit 1
          fi

          cp "$DMG_SOURCE" "dist/${DMG_NAME}"

          shasum -a 256 "dist/${DMG_NAME}" > dist/SHA256SUMS.txt

          RELEASE_NAME="$RELEASE_NAME_INPUT"
          if [[ -z "$RELEASE_NAME" ]]; then
            RELEASE_NAME="My Warp OSS ${TAG}"
          fi

          {
            echo "## My Warp OSS ${TAG}"
            echo
            echo "这是 my-warp 的中文本地化构建。my-warp 是基于官方 Warp 开源仓库维护的个人化 fork，用户可见产品名为 My Warp。"
            echo
            echo "### 本版重点"
            echo
            echo "- 提供 macOS OSS universal DMG，便于下载、校验和本机安装。"
            echo "- 保留上游 Warp 的基础能力，并面向中文系统用户提供高频 UI 汉化。"
            echo "- 覆盖 Settings、onboarding、命令面板、全局搜索、资源中心、常见菜单、通用按钮和基础提示等主要路径。"
            echo "- 本地翻译层只处理客户端 UI，不改写终端输出、AI 模型回复、Agent 运行结果或服务端返回内容。"
            echo "- 首次启动 My Warp 时可从官方 Warp 导入本地配置、主题、标签页和会话恢复数据库，并会先备份当前 My Warp 数据。"
            echo
            echo "### 构建信息"
            echo
            echo "- 源码分支：\`${GITHUB_REF_NAME}\`"
            echo "- 源码提交：\`${GITHUB_SHA}\`"
            echo "- 构建渠道：\`oss\`"
            echo "- macOS 产物：universal DMG"
            echo "- 包内应用名：\`WarpOss.app\`"
            echo "- 产物文件：\`My-Warp-${TAG}-macos-universal-unnotarized.dmg\`"
            echo
            echo "### 验证"
            echo
            echo "- \`cargo xtask check-i18n --check-parity\`"
            echo "- \`cargo xtask check-i18n --mode hard\`"
            echo "- \`cargo test -p warp oss_stable_import\`"
            echo "- \`./script/bundle --channel oss --check-only --nosign\`"
            echo "- \`./script/bundle --channel oss --release-tag ${TAG} --selfsign\`"
            echo
            echo "### 已知限制"
            echo
            echo "- 这是 fork 构建，不是 Warp 官方发布版本。"
            echo "- 当前 DMG 使用 self-signed 或 ad-hoc signing，没有使用 Apple Developer ID notarization；macOS Gatekeeper 首次启动时可能需要手动允许打开。"
            echo "- 当前包内仍沿用 \`WarpOss.app\`、\`warp-oss\` binary 和 \`dev.warp.WarpOss\` bundle id；完整品牌元数据改名会在后续版本处理。"
            echo "- 本版本不会绕过官方账号、订阅、服务端、同步或 AI 能力限制。"
          } > dist/RELEASE_NOTES.md

          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: my-warp-oss-macos-${{ inputs.tag_name }}
          path: |
            dist/*.dmg
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.md
          if-no-files-found: error
          compression-level: 0

      - name: Create or update GitHub release
        if: ${{ inputs.publish_release == true }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.stage_artifacts.outputs.release_name }}
          body_path: dist/RELEASE_NOTES.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/*.dmg
            dist/SHA256SUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}
